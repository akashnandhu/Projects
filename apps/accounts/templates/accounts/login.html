{% extends 'chat/base.html' %}

{% block content %}
<div class="flex-grow flex items-center justify-center py-16 px-4">
    <div class="max-w-md w-full bg-white p-10 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-50 relative overflow-hidden">
        <!-- Decorative elements -->
        <div class="absolute -top-10 -left-10 w-32 h-32 bg-blue-100 rounded-full blur-3xl opacity-50"></div>
        <div class="absolute -bottom-10 -right-10 w-32 h-32 bg-sky-100 rounded-full blur-3xl opacity-50"></div>
        
        <div class="relative z-10">
            <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900 tracking-tight">Welcome back</h2>
            <p class="mt-3 text-center text-sm text-gray-500">Sign in to continue your journey</p>
        </div>
        
        <form class="mt-8 space-y-6 relative z-10" action="{% url 'login' %}" method="POST">
            {% csrf_token %}
            <div class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                    <input id="username" name="username" type="text" required class="block w-full px-4 py-3 border border-gray-200 bg-gray-50 rounded-xl focus:bg-white focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm" placeholder="Enter your username">
                </div>
                <div>
                    <label for="password" class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                    <input id="password" name="password" type="password" required class="block w-full px-4 py-3 border border-gray-200 bg-gray-50 rounded-xl focus:bg-white focus:outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all text-sm" placeholder="Enter your password">
                </div>
            </div>

            <div class="pt-2">
                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent text-sm font-semibold rounded-xl text-white bg-gradient-to-r from-blue-600 to-sky-500 hover:from-blue-700 hover:to-sky-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 shadow-md shadow-blue-500/20 transform hover:-translate-y-0.5 transition-all">
                    Sign in
                </button>
            </div>
            
            <p class="mt-6 text-center text-sm text-gray-500 font-medium">
                Don't have an account? <a href="{% url 'register' %}" class="text-blue-600 hover:text-blue-500 font-semibold">Register here</a>
            </p>
        </form>
    </div>
</div>
{% endblock %}
