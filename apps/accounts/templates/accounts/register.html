{% extends 'chat/base.html' %}

{% block content %}
<div class="flex-grow flex items-center justify-center py-16 px-4">
    <div class="max-w-md w-full bg-white p-10 rounded-2xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-gray-50 relative overflow-hidden">
        <!-- Decorative elements -->
        <div class="absolute -top-10 -right-10 w-32 h-32 bg-sky-100 rounded-full blur-3xl opacity-50"></div>
        <div class="absolute -bottom-10 -left-10 w-32 h-32 bg-blue-100 rounded-full blur-3xl opacity-50"></div>
        
        <div class="relative z-10">
            <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900 tracking-tight">Create your account</h2>
            <p class="mt-3 text-center text-sm text-gray-500">Join our safe space and start healing today</p>
        </div>
        
        <form class="mt-8 space-y-5 relative z-10" action="{% url 'register' %}" method="POST">
            {% csrf_token %}
            
            <div class="space-y-4">
                {% for field in form %}
                    <div>
                        <label for="{{ field.id_for_label }}" class="block text-sm font-semibold text-gray-700 mb-1">{{ field.label }}</label>
                        <div class="mt-1">
                            {{ field }}
                        </div>
                    </div>
                {% endfor %}
            </div>

            <div class="pt-2">
                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent text-sm font-semibold rounded-xl text-white bg-gradient-to-r from-blue-600 to-sky-500 hover:from-blue-700 hover:to-sky-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 shadow-md shadow-blue-500/20 transform hover:-translate-y-0.5 transition-all">
                    Register Now
                </button>
            </div>
            
            <p class="mt-6 text-center text-sm text-gray-500 font-medium">
                Already have an account? <a href="{% url 'login' %}" class="text-blue-600 hover:text-blue-500 font-semibold">Sign in</a>
            </p>
        </form>
    </div>
</div>
<style>
    /* Styling form inputs gracefully */
    input[type="text"], input[type="password"], input[type="email"] {
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: 0.75rem;
        border: 1px solid #e2e8f0;
        background-color: #f8fafc;
        transition: all 0.2s;
        font-size: 0.875rem;
    }
    input[type="text"]:focus, input[type="password"]:focus, input[type="email"]:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        background-color: #ffffff;
    }
    input[type="checkbox"] {
        width: 1.25rem;
        height: 1.25rem;
        border-radius: 0.25rem;
        border-color: #cbd5e1;
        color: #3b82f6;
        cursor: pointer;
    }
</style>
{% endblock %}
