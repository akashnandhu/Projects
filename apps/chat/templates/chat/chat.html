{% extends 'chat/base.html' %}
{% load static %}

{% block content %}
<div class="flex-grow flex flex-col h-[calc(100vh-4rem)] max-w-4xl w-full mx-auto p-4 relative">
    
    <!-- Connection Status -->
    <div class="flex items-center text-xs text-gray-500 mb-2">
        <span id="connection-status-indicator" class="h-2 w-2 rounded-full bg-red-500 mr-2"></span>
        <span id="connection-status-text">Disconnected</span>
    </div>

    <!-- Chat Window -->
    <div class="flex-grow bg-white border border-gray-200 rounded-lg shadow-sm flex flex-col overflow-hidden relative">
        
        <!-- Messages Area -->
        <div id="chat-messages" class="flex-grow p-4 overflow-y-auto flex flex-col space-y-4">
            <!-- Messages will be injected here -->
        </div>

        <!-- Typing Indicator -->
        <div id="typing-indicator" class="hidden p-4">
            <div class="flex items-center text-gray-400 italic text-sm">
                Bot is typing<span class="animate-pulse ml-1">...</span>
            </div>
        </div>

        <!-- Input Area -->
        <div class="p-4 bg-gray-50 border-t border-gray-200">
            <div class="flex space-x-2">
                <textarea id="chat-input" class="flex-grow resize-none rounded-md border border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 py-2 px-3" rows="1" placeholder="Type your message..."></textarea>
                <button id="send-button" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition self-end">
                    Send
                </button>
            </div>
        </div>
    </div>

    <!-- Crisis Intervention Modal (Hidden) -->
    <div id="crisis-modal" class="hidden fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" aria-hidden="true"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>
            <div id="crisis-modal-content" class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>
</div>

{{ session_id|json_script:"session-id" }}
{% endblock %}

{% block scripts %}
<script src="{% static 'js/chat.js' %}"></script>
{% endblock %}
